<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Історія аналізів — F1 Pilot Sentiment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<div class="max-w-7xl mx-auto p-8">

    <div class="flex items-center justify-between mb-8">
        <h1 class="text-4xl font-bold text-blue-700 flex items-center gap-3">
            <i class="fa-solid fa-clock-rotate-left"></i>
            Історія аналізів
        </h1>
        <a href="/"
           class="px-6 py-3 bg-white hover:bg-slate-100 border border-slate-300 rounded-2xl
                      font-medium flex items-center gap-2 transition shadow-sm">
            <i class="fa-solid fa-arrow-left"></i>
            Новий аналіз
        </a>
    </div>

    <div class="bg-white border border-slate-200 rounded-3xl shadow-xl overflow-hidden">
        <table class="w-full">
            <thead>
            <tr class="bg-slate-100 border-b border-slate-200">
                <th class="py-5 px-8 text-left font-medium text-slate-600">ЧАС</th>
                <th class="py-5 px-8 text-left font-medium text-slate-600">ПІЛОТ</th>
                <th class="py-5 px-8 text-left font-medium text-slate-600">РОЗПІЗНАНИЙ ТЕКСТ</th>
                <th class="py-5 px-8 text-left font-medium text-slate-600">ТОНАЛЬНІСТЬ</th>
                <th class="py-5 px-8 text-center font-medium text-slate-600">СТРЕС</th>
                <th class="py-5 px-8 text-center font-medium text-slate-600">ВПЕВНЕНІСТЬ</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="res : ${results}" class="hover:bg-slate-50 transition">
                <td class="py-5 px-8 text-sm text-slate-500" th:text="${res.timestamp}"></td>
                <td class="py-5 px-8 font-medium text-slate-800" th:text="${res.pilotId}"></td>
                <td class="py-5 px-8 text-slate-700" th:text="${res.emotions}"></td>

                <!-- Тональність -->
                <td class="py-5 px-8">
                            <span th:if="${res.polarity == 'NEGATIVE'}"
                                  class="px-4 py-1 rounded-full text-sm font-semibold bg-rose-100 text-rose-700">NEGATIVE</span>
                    <span th:if="${res.polarity == 'POSITIVE'}"
                          class="px-4 py-1 rounded-full text-sm font-semibold bg-emerald-100 text-emerald-700">POSITIVE</span>
                    <span th:if="${res.polarity == 'NEUTRAL'}"
                          class="px-4 py-1 rounded-full text-sm font-semibold bg-amber-100 text-amber-700">NEUTRAL</span>
                </td>

                <td class="py-5 px-8 text-center font-bold text-rose-600" th:text="${res.stressLevel}"></td>
                <td class="py-5 px-8 text-center font-bold text-blue-600" th:text="${res.confidence}"></td>
            </tr>
            </tbody>
        </table>

        <div th:if="${results.isEmpty()}" class="text-center py-16 text-slate-500">
            <i class="fa-solid fa-folder-open text-6xl mb-4"></i>
            <p class="text-lg">Поки що немає аналізів</p>
        </div>
    </div>

    <div class="text-center mt-10">
        <a href="/dashboard"
           class="text-slate-600 hover:text-blue-600 flex items-center justify-center gap-2 transition text-lg">
            <i class="fa-solid fa-gauge-high"></i>
            Перейти до Реал-тайм Дашборду
        </a>
    </div>
</div>
</body>
</html>
