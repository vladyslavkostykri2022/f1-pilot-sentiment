<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>F1 Pilot Sentiment • Реальний час</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<div class="max-w-7xl mx-auto p-6">

    <!-- Заголовок -->
    <h1 class="text-4xl font-bold text-center text-blue-700 mb-2 tracking-tight">
        F1 PILOT SENTIMENT
    </h1>
    <p class="text-center text-xl text-slate-600 mb-8">
        Моніторинг емоційного стану пілотів у реальному часі
    </p>

    <!-- Реал-тайм карта -->
    <div id="live-card"
         class="bg-white border border-slate-200 rounded-3xl p-8 mb-10 shadow-xl">
        <div class="flex justify-between items-center mb-6">
            <div>
                    <span class="text-emerald-600 text-sm font-medium flex items-center gap-1">
                        <i class="fa-solid fa-circle text-xs animate-pulse"></i> LIVE
                    </span>
                <h2 id="pilot-name" class="text-3xl font-bold text-slate-900">
                    Очікування сигналу...
                </h2>
            </div>
            <div id="status"
                 class="px-6 py-2 rounded-full text-xl font-bold bg-slate-100 text-slate-700">
                NEUTRAL
            </div>
        </div>

        <div class="grid grid-cols-3 gap-8 text-center">
            <div>
                <p class="text-slate-500 text-sm">РІВЕНЬ СТРЕСУ</p>
                <p id="stress-level" class="text-6xl font-bold text-rose-500">0.00</p>
            </div>
            <div>
                <p class="text-slate-500 text-sm">ТОНАЛЬНІСТЬ</p>
                <p id="polarity" class="text-5xl font-bold text-slate-900">—</p>
            </div>
            <div>
                <p class="text-slate-500 text-sm">ВПЕВНЕНІСТЬ</p>
                <p id="confidence" class="text-6xl font-bold text-blue-600">0.00</p>
            </div>
        </div>
    </div>

    <!-- Історія аналізів -->
    <div class="bg-white border border-slate-200 rounded-3xl p-8 shadow-xl">
        <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3 text-slate-900">
            <i class="fa-solid fa-clock-rotate-left"></i>
            Історія аналізів
        </h2>
        <table class="w-full text-left">
            <thead>
            <tr class="border-b border-slate-200">
                <th class="pb-4 text-slate-500">Час</th>
                <th class="pb-4 text-slate-500">Пілот</th>
                <th class="pb-4 text-slate-500">Тональність</th>
                <th class="pb-4 text-slate-500">Стрес</th>
                <th class="pb-4 text-slate-500">Текст</th>
            </tr>
            </thead>
            <tbody id="history-body" class="text-slate-700"></tbody>
        </table>
    </div>

    <div class="text-center mt-10">
        <a href="/" class="text-slate-500 hover:text-blue-600 transition flex items-center justify-center gap-2">
            ← Повернутися на головну
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/dist/stomp.min.js"></script>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
